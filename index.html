<title>Shema — Organize. Prepare. Proclaim.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* brand palette */
    --forest:#1F3A34; --forest-2:#16302a; --forest-3:#0f251f;
    --sage:#5C6F62; --sage-light:#8fa093;
    --gold:#C7A66A; --gold-dim:#a3835a; --gold-soft:#efe3cd;
    --cream:#F3F1EA; --cream-2:#eae5d6; --cream-3:#e2dcc8;
    --ink:#1A1A1A;
    --red:#b5544a;

    /* semantic tokens — light theme (default, used by Library/Prep/Illustrations) */
    --bg:var(--cream); --panel:#ffffff; --panel-2:var(--cream-2); --panel-3:var(--cream-3);
    --line:#ddd6c7; --text:var(--ink); --muted:var(--sage);
    --gold-soft-bg:var(--gold-soft);
  }
  /* dark theme scope — bottom nav + Present mode (stage view) */
  #bottomnav, #view-present{
    --bg:var(--forest-3); --panel:var(--forest-2); --panel-2:var(--forest); --panel-3:#24463c;
    --line:#34544a; --text:var(--cream); --muted:var(--sage-light);
    --red:#d98b7f;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none;}
  html,body{height:100%; overscroll-behavior:none;}
  body{
    margin:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased; overflow:hidden; position:fixed; inset:0;
    user-select:none; -webkit-user-select:none; touch-action:manipulation;
  }
  input, textarea{ user-select:text; -webkit-user-select:text; }
  button{font-family:inherit;}
  #app{ display:flex; flex-direction:column; height:100vh; height:100dvh;
    padding-top:env(safe-area-inset-top); padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right); }

  #brandbar{
    display:flex; align-items:center; gap:9px; padding:10px 16px;
    background:var(--panel); border-bottom:1px solid var(--line); flex-shrink:0;
  }
  #brandbar .brand-mark{ width:26px; height:26px; object-fit:contain; }
  #brandbar .brand-word{
    font-family:'Playfair Display',serif; font-weight:700; font-size:19px; color:var(--ink); letter-spacing:0.2px;
  }
  #presentBrand{ display:flex; align-items:center; gap:7px; }
  #presentBrand img{ width:20px; height:20px; object-fit:contain; }
  #presentBrand span{ font-family:'Playfair Display',serif; font-weight:700; font-size:14px; color:var(--cream); opacity:0.85; }

  /* ===== shared ===== */
  .view{ flex:1; overflow:hidden; display:none; flex-direction:column; }
  .view.active{ display:flex; }
  .view-header{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:14px 16px; background:var(--panel); border-bottom:1px solid var(--line); flex-shrink:0;
  }
  .view-header h1{ font-family:'Playfair Display',serif; font-size:20px; margin:0; color:var(--text); }
  .btn{
    background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:9px 16px; border-radius:9px; font-size:14px; font-weight:600; cursor:pointer;
  }
  .btn.gold{ background:var(--gold); color:var(--ink); border:none; }
  .btn.icon{ width:38px; height:38px; padding:0; display:flex; align-items:center; justify-content:center; font-size:16px; }
  .btn.danger{ color:var(--red); border-color:#d8b9ae; }
  .scroll{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }

  /* bottom nav */
  #bottomnav{
    display:flex; background:var(--panel); border-top:1px solid var(--line); flex-shrink:0;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .nav-item{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:9px 0 8px; background:none; border:none; color:var(--muted); cursor:pointer; font-size:10px;
    letter-spacing:.5px; text-transform:uppercase; font-weight:600;
  }
  .nav-item .ic{ font-size:19px; }
  .nav-item.active{ color:var(--gold); }

  /* ===== LIBRARY ===== */
  #libraryList{ padding:12px 14px 24px; }
  .sermon-card{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:14px 16px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; gap:10px;
  }
  .sermon-card .info{ flex:1; min-width:0; }
  .sermon-card .title{ font-family:'Playfair Display',serif; font-weight:600; font-size:17px; margin:0 0 4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sermon-card .meta{ font-size:12px; color:var(--muted); display:flex; gap:8px; flex-wrap:wrap; }
  .tag{ background:var(--gold-soft); color:var(--gold-dim); padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; }
  .sermon-card .actions{ display:flex; gap:6px; flex-shrink:0; }
  #emptyLibrary{ text-align:center; color:var(--muted); padding:60px 30px; line-height:1.6; }
  #emptyLibrary button{ margin-top:14px; }
  #seriesFilter{ display:flex; gap:8px; padding:0 14px 12px; overflow-x:auto; flex-shrink:0; }
  .chip{ background:var(--panel-2); border:1px solid var(--line); color:var(--muted); padding:6px 14px; border-radius:20px; font-size:12px; white-space:nowrap; cursor:pointer; }
  .chip.active{ background:var(--gold-soft); color:var(--gold-dim); border-color:var(--gold-dim); }

  /* ===== TEMPLATE PICKER MODAL ===== */
  .modal-overlay{ position:fixed; inset:0; background:rgba(10,12,15,.88); z-index:60; display:none; align-items:flex-end; justify-content:center; }
  .modal-overlay.open{ display:flex; }
  .modal-sheet{ background:var(--panel); border-radius:18px 18px 0 0; width:100%; max-width:640px; max-height:82vh; display:flex; flex-direction:column; padding-bottom:env(safe-area-inset-bottom); }
  .modal-sheet-header{ display:flex; justify-content:space-between; align-items:center; padding:16px 18px 10px; }
  .modal-sheet-header h2{ font-family:'Playfair Display',serif; font-size:19px; margin:0; color:var(--forest); }
  .modal-sheet .scroll{ padding:0 18px 18px; }
  .tpl-card{
    background:var(--panel-2); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:10px; cursor:pointer;
  }
  .tpl-card:active{ background:var(--panel-3); }
  .tpl-card .tname{ font-weight:700; font-size:15px; margin-bottom:6px; }
  .tpl-card .tsecs{ font-size:12px; color:var(--muted); }

  /* ===== EDITOR ===== */
  #editorMeta{ padding:14px 16px 6px; display:flex; flex-direction:column; gap:8px; background:var(--panel); border-bottom:1px solid var(--line); flex-shrink:0; }
  #editorMeta input{
    background:var(--panel-2); border:1px solid var(--line); color:var(--text); border-radius:9px; padding:10px 12px; font-size:15px;
  }
  #titleInput{ font-family:'Playfair Display',serif; font-size:19px; font-weight:600; }
  .meta-row{ display:flex; gap:8px; }
  .meta-row input{ flex:1; font-size:13px; }
  #sectionsWrap{ padding:14px 14px 100px; }
  .sec-block{ background:var(--panel); border:1px solid var(--line); border-radius:12px; margin-bottom:14px; overflow:hidden; }
  .sec-head{ display:flex; align-items:center; gap:8px; padding:10px 12px; background:var(--panel-2); border-bottom:1px solid var(--line); }
  .sec-head input{ flex:1; background:none; border:none; color:var(--forest); font-weight:700; font-size:15px; letter-spacing:.5px; text-transform:uppercase; }
  .sec-head .icon-sm{ background:none; border:none; color:var(--muted); font-size:15px; cursor:pointer; width:28px; height:28px; }
  .item-row{ display:flex; align-items:flex-start; gap:8px; padding:8px 12px; border-bottom:1px solid var(--line); }
  .item-row:last-child{ border-bottom:none; }
  .item-row select{ background:var(--panel-2); border:1px solid var(--line); color:var(--muted); font-size:11px; border-radius:6px; padding:4px; flex-shrink:0; }
  .item-row textarea{
    flex:1; background:none; border:none; color:var(--text); font-size:14px; line-height:1.5; resize:none; padding:4px 0; font-family:inherit;
  }
  .item-row .icon-sm{ background:none; border:none; color:var(--muted); font-size:14px; cursor:pointer; flex-shrink:0; }
  .sec-foot{ display:flex; gap:8px; padding:8px 12px; }
  .sec-foot button{ background:none; border:none; color:var(--gold-dim); font-size:12px; font-weight:600; cursor:pointer; padding:4px 0; }
  #addSectionBtn{ width:100%; padding:12px; border:1px dashed var(--line); background:none; color:var(--muted); border-radius:12px; font-size:13px; cursor:pointer; }
  #editorFooter{ display:flex; gap:10px; padding:12px 14px; background:var(--panel); border-top:1px solid var(--line); flex-shrink:0; padding-bottom:calc(12px + env(safe-area-inset-bottom)); }
  #editorFooter .btn{ flex:1; }

  /* ===== ILLUSTRATIONS ===== */
  #illustList{ padding:12px 14px 90px; }
  .illust-card{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:10px; }
  .illust-card .ititle{ font-family:'Playfair Display',serif; font-weight:600; font-size:16px; margin:0 0 6px; }
  .illust-card .ibody{ font-size:13px; color:var(--muted); line-height:1.5; margin:0 0 8px; max-height:60px; overflow:hidden; }
  .illust-card .itags{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  .illust-card .iactions{ display:flex; gap:8px; }
  #fabAdd{
    position:absolute; bottom:calc(78px + env(safe-area-inset-bottom)); right:20px;
    width:52px; height:52px; border-radius:50%; background:var(--gold); color:var(--ink); border:none;
    font-size:24px; box-shadow:0 4px 14px rgba(0,0,0,.4); cursor:pointer; z-index:10;
  }

  /* form modal (illustration edit) */
  #illustForm input, #illustForm textarea{
    width:100%; background:var(--panel-2); border:1px solid var(--line); color:var(--text); border-radius:9px;
    padding:10px 12px; font-size:14px; margin-bottom:10px; font-family:inherit;
  }
  #illustForm textarea{ min-height:110px; resize:none; line-height:1.5; }
  #illustForm label{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; display:block; margin-bottom:4px; }

  /* illustration picker (from editor) */
  .ipick-card{ background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:8px; cursor:pointer; }
  .ipick-card:active{ background:var(--panel-3); }
  .ipick-card .ptitle{ font-weight:700; font-size:14px; margin-bottom:4px; }
  .ipick-card .pbody{ font-size:12px; color:var(--muted); max-height:40px; overflow:hidden; }

  /* ===== PRESENT (unchanged core) ===== */
  #presentTop{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 14px; background:var(--panel); border-bottom:1px solid var(--line); flex-shrink:0; position:relative; }
  .timer-block{ display:flex; align-items:center; gap:14px; }
  .clock-col{ display:flex; flex-direction:column; gap:4px; }
  #clockDisplay{ font-family:'IBM Plex Mono',monospace; font-weight:500; font-size:14px; letter-spacing:1px; color:var(--muted); }
  .countdown-row{ display:flex; align-items:center; gap:8px; }
  #timerDisplay{
    font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:28px; letter-spacing:1px; min-width:106px;
    padding:4px 10px; border-radius:8px; border:1px solid var(--line); background:var(--panel-2); cursor:pointer;
    user-select:none; transition:color .3s, border-color .3s; text-align:center;
  }
  #timerDisplay.running{ border-color:var(--gold-dim); }
  #timerDisplay.warn{ color:#e2be7d; border-color:#8a6a3a; }
  #timerDisplay.over{ color:#e29184; border-color:#8a4a3f; }
  .timer-btn{ background:none; border:1px solid var(--line); color:var(--muted); width:34px; height:34px; border-radius:8px; font-size:15px; cursor:pointer; }
  .timer-btn:active{ background:var(--panel-2); }
  #targetWrap{ display:flex; align-items:center; gap:4px; font-size:12px; color:var(--muted); }
  #targetInput{ width:42px; background:var(--panel-2); border:1px solid var(--line); color:var(--text); border-radius:6px; text-align:center; font-family:'IBM Plex Mono',monospace; font-size:13px; padding:3px 0; }
  .top-actions{ display:flex; gap:8px; align-items:center; }
  .icon-btn{ background:none; border:1px solid var(--line); color:var(--muted); width:34px; height:34px; border-radius:8px; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .icon-btn:active{ background:var(--panel-2); }
  #track{ display:flex; gap:6px; padding:8px 14px; background:var(--bg); border-bottom:1px solid var(--line); overflow-x:auto; flex-shrink:0; }
  .dot{ flex:1; min-width:28px; height:5px; border-radius:3px; background:var(--panel-2); cursor:pointer; transition:background .25s; }
  .dot.active{ background:var(--gold); }
  .dot.done{ background:var(--gold-dim); }
  #stage{ flex:1; overflow:hidden; position:relative; display:flex; align-items:flex-start; justify-content:center; padding:4vh 6vw; }
  #sectionLabel{ position:absolute; top:14px; left:50%; transform:translateX(-50%); font-size:12px; letter-spacing:2px; text-transform:uppercase; color:var(--gold-dim); }
  #sectionContent{ width:100%; max-width:900px; margin-top:44px; overflow-y:auto; max-height:calc(100% - 44px); padding-right:4px; }
  #sectionTitle{ font-family:'Playfair Display',serif; font-weight:700; font-size:var(--title-size,44px); line-height:1.1; margin:0 0 26px; border-bottom:2px solid var(--gold-dim); padding-bottom:14px; }
  .line{ font-size:var(--body-size,26px); line-height:1.55; margin:0 0 18px; }
  .line.bullet{ padding-left:1.1em; position:relative; }
  .line.bullet::before{ content:"—"; position:absolute; left:0; color:var(--gold); }
  .line.quiet{ color:var(--muted); font-style:italic; font-size:calc(var(--body-size,26px) - 5px); }
  #emptyPresent{ color:var(--muted); font-size:18px; text-align:center; margin-top:15vh; line-height:1.6; }
  #presentNav{ display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--panel); border-top:1px solid var(--line); flex-shrink:0; padding-bottom:calc(12px + env(safe-area-inset-bottom)); }
  .nav-btn{ background:var(--panel-2); border:1px solid var(--line); color:var(--text); padding:12px 22px; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; min-width:100px; }
  .nav-btn:disabled{ opacity:.35; }
  #navCounter{ color:var(--muted); font-size:13px; font-family:'IBM Plex Mono',monospace; }
  #fontPop{ position:absolute; top:52px; right:14px; background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:10px; display:none; gap:8px; z-index:40; }
  #fontPop.open{ display:flex; }
  #fontPop button{ background:var(--panel); border:1px solid var(--line); color:var(--text); width:36px; height:36px; border-radius:8px; font-size:16px; }

  @media (min-width:768px){
    #timerDisplay{ font-size:36px; min-width:130px; padding:6px 14px; }
    .timer-btn,.icon-btn{ width:42px; height:42px; font-size:18px; }
    :root{ --title-size:56px; --body-size:32px; }
    .nav-btn{ padding:16px 30px; font-size:19px; }
    #sectionContent{ max-width:1100px; }
    .view-header h1{ font-size:24px; }
    #libraryList, #illustList{ max-width:800px; margin:0 auto; width:100%; }
    #editorMeta, #sectionsWrap{ max-width:800px; margin:0 auto; width:100%; }
  }
</style>
</head>

<!-- Import raw text -->
<div class="modal-overlay" id="importModal">
  <div class="modal-sheet" style="height:80vh;">
    <div class="modal-sheet-header"><h2>Paste your notes</h2><button class="btn icon" id="closeImportModal">✕</button></div>
    <div class="scroll" style="padding:0 18px 18px; display:flex; flex-direction:column; flex:1;">
      <div style="font-size:12px;color:var(--muted); margin-bottom:8px; line-height:1.5;">

      </div>
      <textarea id="importTextarea" style="flex:1; width:100%; background:var(--panel-2); color:var(--text); border:1px solid var(--line); border-radius:10px; padding:12px; font-family:'IBM Plex Mono',monospace; font-size:13px; line-height:1.6;"></textarea>
      <button class="btn gold" id="importApplyBtn" style="margin-top:10px;">Convert to Sections</button>
    </div>
  </div>
</div>

</div>

<script>
(function(){
  /* ============ STORAGE ============ */
  const STORE_KEY_SERMONS = 'pulpit_sermons_v1';
  const STORE_KEY_ILLUST = 'pulpit_illustrations_v1';

  function loadJSON(key, fallback){
    try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
    catch(e){ return fallback; }
  }
  function saveJSON(key, val){
    try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){ /* storage unavailable */ }
  }
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

  let sermons = loadJSON(STORE_KEY_SERMONS, []);
  let illustrations = loadJSON(STORE_KEY_ILLUST, []);
  function persistSermons(){ saveJSON(STORE_KEY_SERMONS, sermons); }
  function persistIllust(){ saveJSON(STORE_KEY_ILLUST, illustrations); }

  /* ============ TEMPLATES ============ */
  const TEMPLATES = [
    { id:'mwgy', name:'Me / We / God / You / We', desc:'Personal story → shared struggle → scripture → application → close', sections:['ME','WE','GOD','YOU','WE'] },
    { id:'expo', name:'3-Point Expository', desc:'Classic verse-by-verse structure', sections:['INTRODUCTION','POINT 1','POINT 2','POINT 3','CONCLUSION'] },
    { id:'topical', name:'Topical', desc:'Issue-driven, ends in a clear next step', sections:['HOOK','THE PROBLEM','THE ANSWER','APPLICATION','CALL TO ACTION'] },
    { id:'narrative', name:'Narrative', desc:'Tell the story, let the truth land at the turn', sections:['SET THE SCENE','RISING TENSION','THE TURN','RESOLUTION','SO WHAT'] },
    { id:'blank', name:'Blank', desc:'Start from nothing', sections:['NOTES'] }
  ];

  function newSermonFromTemplate(tpl){
    return {
      id: uid(),
      title: '',
      series: '',
      date: new Date().toISOString().slice(0,10),
      updatedAt: Date.now(),
      sections: tpl.sections.map(t => ({ id: uid(), title: t, items: [] }))
    };
  }

  /* ============ VIEW SWITCHING ============ */
  const views = ['library','editor','illustrations','present'];
  function showView(name){
    views.forEach(v=>{
      document.getElementById('view-'+v).classList.toggle('active', v===name);
    });
    document.querySelectorAll('.nav-item').forEach(b=>{
      b.classList.toggle('active', b.dataset.view===name);
    });
    document.getElementById('brandbar').style.display = (name==='present') ? 'none' : 'flex';
    if(name==='library') renderLibrary();
    if(name==='illustrations') renderIllustrations();
  }
  document.querySelectorAll('.nav-item').forEach(b=>{
    b.addEventListener('click', ()=> showView(b.dataset.view));
  });

  /* ============ LIBRARY ============ */
  let activeSeriesFilter = null;

  function renderSeriesFilter(){
    const seriesSet = [...new Set(sermons.map(s=>s.series).filter(Boolean))];
    const wrap = document.getElementById('seriesFilter');
    if(seriesSet.length===0){ wrap.innerHTML=''; return; }
    wrap.innerHTML = '';
    const allChip = document.createElement('div');
    allChip.className = 'chip' + (activeSeriesFilter===null?' active':'');
    allChip.textContent = 'All';
    allChip.addEventListener('click', ()=>{ activeSeriesFilter=null; renderLibrary(); });
    wrap.appendChild(allChip);
    seriesSet.forEach(s=>{
      const c = document.createElement('div');
      c.className = 'chip' + (activeSeriesFilter===s?' active':'');
      c.textContent = s;
      c.addEventListener('click', ()=>{ activeSeriesFilter=s; renderLibrary(); });
      wrap.appendChild(c);
    });
  }

  function renderLibrary(){
    renderSeriesFilter();
    const list = document.getElementById('libraryList');
    let items = [...sermons].sort((a,b)=> b.updatedAt - a.updatedAt);
    if(activeSeriesFilter) items = items.filter(s=>s.series===activeSeriesFilter);
    if(items.length===0){
      list.innerHTML = `<div id="emptyLibrary">No sermons yet.<br>Tap "+ New" to start prepping your first message.</div>`;
      return;
    }
    list.innerHTML = '';
    items.forEach(s=>{
      const card = document.createElement('div');
      card.className = 'sermon-card';
      const dateStr = s.date ? new Date(s.date+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}) : '';
      card.innerHTML = `
        <div class="info">
          <p class="title">${escapeHtml(s.title || 'Untitled Sermon')}</p>
          <div class="meta">${s.series?`<span class="tag">${escapeHtml(s.series)}</span>`:''}${dateStr?`<span>${dateStr}</span>`:''}<span>${s.sections.length} section${s.sections.length===1?'':'s'}</span></div>
        </div>
        <div class="actions">
          <button class="btn icon" data-act="present" title="Present">▶</button>
          <button class="btn icon" data-act="edit" title="Edit">✎</button>
          <button class="btn icon danger" data-act="delete" title="Delete">🗑</button>
        </div>`;
      card.querySelector('[data-act="edit"]').addEventListener('click', ()=> openEditor(s.id));
      card.querySelector('[data-act="present"]').addEventListener('click', ()=> presentSermon(s.id));
      card.querySelector('[data-act="delete"]').addEventListener('click', ()=>{
        if(confirm(`Delete "${s.title||'Untitled Sermon'}"? This can't be undone.`)){
          sermons = sermons.filter(x=>x.id!==s.id);
          persistSermons(); renderLibrary();
        }
      });
      list.appendChild(card);
    });
  }

  document.getElementById('newSermonBtn').addEventListener('click', ()=> openTemplateModal());

  /* ============ TEMPLATE MODAL ============ */
  const templateModal = document.getElementById('templateModal');
  function openTemplateModal(){
    const list = document.getElementById('templateList');
    list.innerHTML = '';
    TEMPLATES.forEach(t=>{
      const c = document.createElement('div');
      c.className = 'tpl-card';
      c.innerHTML = `<div class="tname">${t.name}</div><div class="tsecs">${t.desc}</div>`;
      c.addEventListener('click', ()=>{
        const sermon = newSermonFromTemplate(t);
        sermons.push(sermon);
        persistSermons();
        templateModal.classList.remove('open');
        openEditor(sermon.id);
      });
      list.appendChild(c);
    });
    templateModal.classList.add('open');
  }
  document.getElementById('closeTemplateModal').addEventListener('click', ()=> templateModal.classList.remove('open'));

  /* ============ EDITOR ============ */
  let editingId = null;

  function getEditing(){ return sermons.find(s=>s.id===editingId); }

  function openEditor(id){
    editingId = id;
    const s = getEditing();
    document.getElementById('titleInput').value = s.title || '';
    document.getElementById('seriesInput').value = s.series || '';
    document.getElementById('dateInput').value = s.date || '';
    renderSections();
    showView('editor');
  }

  function renderSections(){
    const s = getEditing();
    const wrap = document.getElementById('sectionsWrap');
    wrap.innerHTML = '';
    s.sections.forEach((sec, si)=>{
      const block = document.createElement('div');
      block.className = 'sec-block';
      block.innerHTML = `
        <div class="sec-head">
          <input value="${escapeAttr(sec.title)}" data-role="sec-title" placeholder="SECTION TITLE">
          <button class="icon-sm" data-act="sec-up" title="Move up">↑</button>
          <button class="icon-sm" data-act="sec-down" title="Move down">↓</button>
          <button class="icon-sm" data-act="sec-del" title="Delete section">🗑</button>
        </div>
        <div class="sec-items"></div>
        <div class="sec-foot">
          <button data-act="add-para">+ line</button>
          <button data-act="add-bullet">+ bullet</button>
          <button data-act="add-quiet">+ quiet note</button>
          <button data-act="add-illust">+ illustration</button>
        </div>`;
      const itemsWrap = block.querySelector('.sec-items');
      sec.items.forEach((it, ii)=>{
        itemsWrap.appendChild(makeItemRow(sec, it, ii));
      });
      block.querySelector('[data-role="sec-title"]').addEventListener('input', e=>{ sec.title = e.target.value; });
      block.querySelector('[data-act="sec-up"]').addEventListener('click', ()=>{
        if(si>0){ [s.sections[si-1], s.sections[si]] = [s.sections[si], s.sections[si-1]]; renderSections(); }
      });
      block.querySelector('[data-act="sec-down"]').addEventListener('click', ()=>{
        if(si<s.sections.length-1){ [s.sections[si+1], s.sections[si]] = [s.sections[si], s.sections[si+1]]; renderSections(); }
      });
      block.querySelector('[data-act="sec-del"]').addEventListener('click', ()=>{
        if(confirm('Delete this section?')){ s.sections.splice(si,1); renderSections(); }
      });
      block.querySelector('[data-act="add-para"]').addEventListener('click', ()=>{ sec.items.push({id:uid(),type:'para',text:''}); renderSections(); });
      block.querySelector('[data-act="add-bullet"]').addEventListener('click', ()=>{ sec.items.push({id:uid(),type:'bullet',text:''}); renderSections(); });
      block.querySelector('[data-act="add-quiet"]').addEventListener('click', ()=>{ sec.items.push({id:uid(),type:'quiet',text:''}); renderSections(); });
      block.querySelector('[data-act="add-illust"]').addEventListener('click', ()=> openIllustPicker(sec));
      wrap.appendChild(block);
    });
    const addBtn = document.createElement('button');
    addBtn.id = 'addSectionBtn';
    addBtn.textContent = '+ Add Section';
    addBtn.addEventListener('click', ()=>{
      s.sections.push({id:uid(), title:'NEW SECTION', items:[]});
      renderSections();
    });
    wrap.appendChild(addBtn);
  }

  function makeItemRow(sec, it, idx){
    const row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML = `
      <select data-role="type">
        <option value="para">line</option>
        <option value="bullet">bullet</option>
        <option value="quiet">quiet</option>
      </select>
      <textarea data-role="text" rows="1" placeholder="Type here...">${it.text}</textarea>
      <button class="icon-sm" data-act="del">✕</button>`;
    const sel = row.querySelector('[data-role="type"]');
    sel.value = it.type;
    sel.addEventListener('change', e=>{ it.type = e.target.value; });
    const ta = row.querySelector('[data-role="text"]');
    autoGrow(ta);
    ta.addEventListener('input', e=>{ it.text = e.target.value; autoGrow(ta); });
    row.querySelector('[data-act="del"]').addEventListener('click', ()=>{
      sec.items.splice(idx,1); renderSections();
    });
    return row;
  }
  function autoGrow(ta){ ta.style.height='auto'; ta.style.height=(ta.scrollHeight)+'px'; }

  document.getElementById('titleInput').addEventListener('input', e=>{ getEditing().title = e.target.value; });
  document.getElementById('seriesInput').addEventListener('input', e=>{ getEditing().series = e.target.value; });
  document.getElementById('dateInput').addEventListener('input', e=>{ getEditing().date = e.target.value; });

  document.getElementById('editorBackBtn').addEventListener('click', ()=>{ saveEditing(); showView('library'); });
  document.getElementById('saveBtn').addEventListener('click', ()=>{ saveEditing(); showView('library'); });
  document.getElementById('presentBtn').addEventListener('click', ()=>{ saveEditing(); presentSermon(editingId); });

  function saveEditing(){
    const s = getEditing();
    if(!s) return;
    s.updatedAt = Date.now();
    persistSermons();
  }

  /* ---- import raw text ---- */
  const importModal = document.getElementById('importModal');
  document.getElementById('importTextBtn').addEventListener('click', ()=>{
    document.getElementById('importTextarea').value = '';
    importModal.classList.add('open');
  });
  document.getElementById('closeImportModal').addEventListener('click', ()=> importModal.classList.remove('open'));
  document.getElementById('importApplyBtn').addEventListener('click', ()=>{
    const raw = document.getElementById('importTextarea').value;
    const parsed = parseRawNotes(raw);
    if(parsed.length){
      const s = getEditing();
      s.sections = parsed;
      renderSections();
    }
    importModal.classList.remove('open');
  });

  function parseRawNotes(raw){
    const lines = raw.split('\n');
    const secs = [];
    let cur = null;
    lines.forEach(line=>{
      const trimmed = line.trim();
      if(!trimmed) return;
      const isHeader = /^#+\s*/.test(trimmed) || (/:$/.test(trimmed) && trimmed.length < 60 && !/^[-*•~]/.test(trimmed));
      if(isHeader){
        cur = { id: uid(), title: trimmed.replace(/^#+\s*/,'').replace(/:$/,'').toUpperCase(), items: [] };
        secs.push(cur);
      } else {
        if(!cur){ cur = { id: uid(), title:'NOTES', items:[] }; secs.push(cur); }
        if(/^[-*•]\s?/.test(trimmed)) cur.items.push({id:uid(), type:'bullet', text:trimmed.replace(/^[-*•]\s?/,'')});
        else if(/^~\s?/.test(trimmed)) cur.items.push({id:uid(), type:'quiet', text:trimmed.replace(/^~\s?/,'')});
        else cur.items.push({id:uid(), type:'para', text:trimmed});
      }
    });
    return secs;
  }

  /* ============ ILLUSTRATIONS ============ */
  function renderIllustrations(){
    const list = document.getElementById('illustList');
    document.getElementById('illustCount').textContent = illustrations.length ? illustrations.length+' saved' : '';
    if(illustrations.length===0){
      list.innerHTML = `<div id="emptyLibrary">No illustrations saved yet.<br>Tap the + button to build your personal library of stories, quotes, and examples.</div>`;
      return;
    }
    list.innerHTML = '';
    [...illustrations].sort((a,b)=>b.updatedAt-a.updatedAt).forEach(ill=>{
      const card = document.createElement('div');
      card.className = 'illust-card';
      card.innerHTML = `
        <p class="ititle">${escapeHtml(ill.title||'Untitled')}</p>
        <p class="ibody">${escapeHtml(ill.body)}</p>
        <div class="itags">${(ill.tags||[]).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
        <div class="iactions">
          <button class="btn icon" data-act="edit">✎</button>
          <button class="btn icon danger" data-act="delete">🗑</button>
        </div>`;
      card.querySelector('[data-act="edit"]').addEventListener('click', ()=> openIllustModal(ill.id));
      card.querySelector('[data-act="delete"]').addEventListener('click', ()=>{
        if(confirm('Delete this illustration?')){
          illustrations = illustrations.filter(x=>x.id!==ill.id);
          persistIllust(); renderIllustrations();
        }
      });
      list.appendChild(card);
    });
  }

  const illustModal = document.getElementById('illustModal');
  let editingIllustId = null;
  function openIllustModal(id){
    editingIllustId = id || null;
    const ill = id ? illustrations.find(x=>x.id===id) : null;
    document.getElementById('illustModalTitle').textContent = id ? 'Edit Illustration' : 'Add Illustration';
    document.getElementById('illustTitleInput').value = ill ? ill.title : '';
    document.getElementById('illustTagsInput').value = ill ? (ill.tags||[]).join(', ') : '';
    document.getElementById('illustBodyInput').value = ill ? ill.body : '';
    illustModal.classList.add('open');
  }
  document.getElementById('fabAdd').addEventListener('click', ()=> openIllustModal(null));
  document.getElementById('closeIllustModal').addEventListener('click', ()=> illustModal.classList.remove('open'));
  document.getElementById('illustSaveBtn').addEventListener('click', ()=>{
    const title = document.getElementById('illustTitleInput').value.trim();
    const tags = document.getElementById('illustTagsInput').value.split(',').map(t=>t.trim()).filter(Boolean);
    const body = document.getElementById('illustBodyInput').value.trim();
    if(!title && !body){ illustModal.classList.remove('open'); return; }
    if(editingIllustId){
      const ill = illustrations.find(x=>x.id===editingIllustId);
      ill.title=title; ill.tags=tags; ill.body=body; ill.updatedAt=Date.now();
    } else {
      illustrations.push({ id:uid(), title, tags, body, updatedAt:Date.now() });
    }
    persistIllust();
    illustModal.classList.remove('open');
    renderIllustrations();
  });

  /* ---- illustration picker from editor ---- */
  const illustPickModal = document.getElementById('illustPickModal');
  let pickTargetSection = null;
  function openIllustPicker(sec){
    pickTargetSection = sec;
    const list = document.getElementById('illustPickList');
    if(illustrations.length===0){
      list.innerHTML = `<div id="emptyLibrary">No illustrations saved yet.<br>Add some from the Illustrations tab first.</div>`;
    } else {
      list.innerHTML = '';
      illustrations.forEach(ill=>{
        const c = document.createElement('div');
        c.className = 'ipick-card';
        c.innerHTML = `<div class="ptitle">${escapeHtml(ill.title||'Untitled')}</div><div class="pbody">${escapeHtml(ill.body)}</div>`;
        c.addEventListener('click', ()=>{
          pickTargetSection.items.push({ id:uid(), type:'para', text: ill.body });
          illustPickModal.classList.remove('open');
          renderSections();
        });
        list.appendChild(c);
      });
    }
    illustPickModal.classList.add('open');
  }
  document.getElementById('closeIllustPickModal').addEventListener('click', ()=> illustPickModal.classList.remove('open'));

  /* ============ PRESENT ============ */
  let presentSections = [];
  let current = 0;
  let bodySize, titleSize;
  const isLargeScreen = window.innerWidth >= 768 || window.innerHeight >= 768;
  bodySize = isLargeScreen ? 32 : 26; titleSize = isLargeScreen ? 56 : 44;

  function presentSermon(id){
    const s = sermons.find(x=>x.id===id);
    presentSections = s ? s.sections.filter(sec => sec.items.length>0 || sec.title) : [];
    current = 0;
    showView('present');
    renderStage();
  }
  document.getElementById('presentBackBtn').addEventListener('click', ()=>{
    if(editingId) showView('editor'); else showView('library');
  });

  function renderTrack(){
    const trackEl = document.getElementById('track');
    trackEl.innerHTML = '';
    presentSections.forEach((s,i)=>{
      const d = document.createElement('div');
      d.className = 'dot' + (i===current?' active':(i<current?' done':''));
      d.title = s.title;
      d.addEventListener('click', ()=>{ current=i; renderStage(); });
      trackEl.appendChild(d);
    });
  }

  function renderStage(){
    document.documentElement.style.setProperty('--body-size', bodySize+'px');
    document.documentElement.style.setProperty('--title-size', titleSize+'px');
    const stageEl = document.getElementById('sectionContent');
    const labelEl = document.getElementById('sectionLabel');
    const navCounter = document.getElementById('navCounter');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    if(presentSections.length===0){
      labelEl.textContent = '';
      stageEl.innerHTML = `<div id="emptyPresent">Nothing to present yet.<br>Open a sermon from your Library, or tap Prep to build one.</div>`;
      navCounter.textContent=''; prevBtn.disabled=true; nextBtn.disabled=true;
      document.getElementById('track').innerHTML=''; return;
    }
    const s = presentSections[current];
    labelEl.textContent = `Section ${current+1} of ${presentSections.length}`;
    let html = `<div id="sectionTitle">${escapeHtml(s.title)}</div>`;
    s.items.forEach(it=>{
      if(it.type==='bullet') html += `<p class="line bullet">${escapeHtml(it.text)}</p>`;
      else if(it.type==='quiet') html += `<p class="line quiet">${escapeHtml(it.text)}</p>`;
      else html += `<p class="line">${escapeHtml(it.text)}</p>`;
    });
    stageEl.innerHTML = html;
    stageEl.scrollTop = 0;
    navCounter.textContent = `${current+1} / ${presentSections.length}`;
    prevBtn.disabled = current===0;
    nextBtn.disabled = current===presentSections.length-1;
    renderTrack();
  }

  document.getElementById('prevBtn').addEventListener('click', ()=>{ if(current>0){current--; renderStage();} });
  document.getElementById('nextBtn').addEventListener('click', ()=>{ if(current<presentSections.length-1){current++; renderStage();} });
  document.addEventListener('keydown', e=>{
    if(!document.getElementById('view-present').classList.contains('active')) return;
    if(e.key==='ArrowRight') document.getElementById('nextBtn').click();
    if(e.key==='ArrowLeft') document.getElementById('prevBtn').click();
    if(e.key===' '){ e.preventDefault(); document.getElementById('timerDisplay').click(); }
  });
  let touchX=null;
  const stageWrap = document.getElementById('stage');
  stageWrap.addEventListener('touchstart', e=>{ touchX=e.touches[0].clientX; });
  stageWrap.addEventListener('touchend', e=>{
    if(touchX===null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if(Math.abs(dx)>60){ dx<0 ? document.getElementById('nextBtn').click() : document.getElementById('prevBtn').click(); }
    touchX=null;
  });

  const fontBtn = document.getElementById('fontBtn');
  const fontPop = document.getElementById('fontPop');
  fontBtn.addEventListener('click', ()=> fontPop.classList.toggle('open'));
  document.getElementById('fontUp').addEventListener('click', ()=>{ bodySize=Math.min(bodySize+2,40); titleSize=Math.min(titleSize+3,64); renderStage(); });
  document.getElementById('fontDown').addEventListener('click', ()=>{ bodySize=Math.max(bodySize-2,16); titleSize=Math.max(titleSize-3,28); renderStage(); });

  /* ---- clock + countdown ---- */
  const clockDisplay = document.getElementById('clockDisplay');
  const timerDisplay = document.getElementById('timerDisplay');
  const playBtn = document.getElementById('playBtn');
  const resetBtn = document.getElementById('resetBtn');
  const targetInput = document.getElementById('targetInput');
  let remaining = 20*60, running = false, intervalId = null, wakeLock = null;

  async function requestWakeLock(){ try{ if('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); }catch(e){} }
  function releaseWakeLock(){ if(wakeLock){ wakeLock.release().catch(()=>{}); wakeLock=null; } }
  document.addEventListener('visibilitychange', ()=>{ if(running && document.visibilityState==='visible') requestWakeLock(); });

  function updateClock(){
    const now=new Date(); let h=now.getHours(); const m=now.getMinutes().toString().padStart(2,'0');
    const ampm = h>=12?'PM':'AM'; h=h%12; if(h===0)h=12;
    clockDisplay.textContent = `${h}:${m} ${ampm}`;
  }
  updateClock(); setInterval(updateClock, 1000);

  function fmt(s){ const sign=s<0?'-':''; const a=Math.abs(s); const m=Math.floor(a/60).toString().padStart(2,'0'); const sec=(a%60).toString().padStart(2,'0'); return sign+m+':'+sec; }
  function tick(){ remaining--; updateTimerDisplay(); }
  function updateTimerDisplay(){
    timerDisplay.textContent = fmt(remaining);
    timerDisplay.classList.toggle('running', running);
    playBtn.textContent = running ? '❚❚' : '▶';
    timerDisplay.classList.remove('warn','over');
    if(remaining<=0) timerDisplay.classList.add('over');
    else if(remaining<=60) timerDisplay.classList.add('warn');
  }
  function toggleTimer(){
    running=!running;
    if(running){ intervalId=setInterval(tick,1000); requestWakeLock(); }
    else { clearInterval(intervalId); releaseWakeLock(); }
    updateTimerDisplay();
  }
  timerDisplay.addEventListener('click', toggleTimer);
  playBtn.addEventListener('click', toggleTimer);
  resetBtn.addEventListener('click', ()=>{
    running=false; clearInterval(intervalId); releaseWakeLock();
    const mins=parseFloat(targetInput.value); remaining=(mins&&!isNaN(mins)?mins:20)*60; updateTimerDisplay();
  });
  targetInput.addEventListener('change', ()=>{
    if(!running){ const mins=parseFloat(targetInput.value); remaining=(mins&&!isNaN(mins)?mins:20)*60; updateTimerDisplay(); }
  });
  targetInput.value = 20;
  updateTimerDisplay();

  /* ============ UTIL ============ */
  function escapeHtml(str){ const d=document.createElement('div'); d.textContent=str==null?'':str; return d.innerHTML; }
  function escapeAttr(str){ return escapeHtml(str).replace(/"/g,'&quot;'); }

  /* ============ SERVICE WORKER ============ */
  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{
      navigator.serviceWorker.register('sw.js').catch(()=>{ /* fine if unavailable, e.g. local file preview */ });
    });
  }

  /* ============ INIT ============ */
  renderLibrary();
})();
</script>
</body>
</html>
